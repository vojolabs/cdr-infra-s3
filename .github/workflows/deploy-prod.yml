name: "[PROD] deploy"

on: 
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prod
      project_name: "cidade-refugio-backend"
      aws-assume-role-arn: "arn:aws:iam::9109729782782:role/github-actions-deploy-role"
      aws-region: "sa-east-1"
      aws-statefile-s3-bucket: "cidade-refugio-backend-terraform-state-9109729782782"
      aws-lock-dynamodb-table: "cidade-refugio-backend-terraform-state-lock"