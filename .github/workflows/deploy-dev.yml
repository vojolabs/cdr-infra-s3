name: "[DEV] deploy"

on: 
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      project_name: "cidade-refugio-backend"
      aws-assume-role-arn: "arn:aws:iam::164599051832:role/github-actions-deploy-role"
      aws-region: "sa-east-1"
      aws-statefile-s3-bucket: "cidade-refugio-backend-terraform-state-164599051832"
      aws-lock-dynamodb-table: "cidade-refugio-backend-terraform-state-lock"
